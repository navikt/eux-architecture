name: portal build & deploy
run-name: portal build - ${{ github.event.head_commit.message }}

permissions:
  contents: read
  id-token: write
  packages: write

on:
  push:
    branches: [ main, 2-portal ]
    paths:
      - 'portal/**'
      - '.github/workflows/portal-build-deploy.yaml'
  pull_request:
    paths:
      - 'portal/**'
      - '.github/workflows/portal-build-deploy.yaml'
  workflow_dispatch:

env:
  READER_TOKEN: ${{ secrets.READER_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build, test and image
    runs-on: ubuntu-latest

    outputs:
      docker-image: ${{ steps.docker-build-push.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up pnpm
        uses: pnpm/action-setup@v5
        with:
          version: 10

      - name: Check for lockfile
        id: lockfile
        working-directory: portal
        run: |
          if [ -f pnpm-lock.yaml ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Node 22 (with pnpm cache)
        if: steps.lockfile.outputs.exists == 'true'
        uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: 'pnpm'
          cache-dependency-path: portal/pnpm-lock.yaml

      - name: Set up Node 22 (bootstrap, no cache)
        if: steps.lockfile.outputs.exists == 'false'
        uses: actions/setup-node@v5
        with:
          node-version: 22

      - name: Install dependencies
        working-directory: portal
        env:
          READER_TOKEN: ${{ secrets.READER_TOKEN }}
        run: |
          if [ -f pnpm-lock.yaml ]; then
            pnpm install --frozen-lockfile
          else
            pnpm install --no-frozen-lockfile
          fi

      - name: Typecheck
        working-directory: portal
        run: pnpm typecheck

      - name: Lint
        working-directory: portal
        run: pnpm lint

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: portal/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('portal/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-

      - name: Build
        working-directory: portal
        run: pnpm build

      - name: Push docker image to GAR
        if: github.event_name != 'pull_request'
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: eessibasis
          image_suffix: portal
          docker_context: portal
          dockerfile: portal/Dockerfile
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}
          build_secrets: |
            READER_TOKEN=${{ secrets.READER_TOKEN }}

  deploy-dev:
    name: 'Deploy to NAIS - dev-gcp'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: 'Calling deploy action (eessibasis namespace)'
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: portal/.nais/nais.yaml
          VAR: image=${{ needs.build.outputs.docker-image }}
          VARS: portal/.nais/dev.yaml
          PRINT_PAYLOAD: true
