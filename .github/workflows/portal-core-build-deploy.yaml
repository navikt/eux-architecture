name: portal-core build & deploy
run-name: portal-core build - ${{ github.event.head_commit.message }}

permissions:
  contents: read
  id-token: write
  packages: write

on:
  push:
    branches: [ main ]
    paths:
      - 'portal-core/**'
      - '.github/workflows/portal-core-build-deploy.yaml'
  pull_request:
    paths:
      - 'portal-core/**'
      - '.github/workflows/portal-core-build-deploy.yaml'
  workflow_dispatch:

env:
  READER_TOKEN: ${{ secrets.READER_TOKEN }}
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build, test and image
    runs-on: ubuntu-latest

    outputs:
      docker-image: ${{ steps.docker-build-push.outputs.image }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Java 25
        uses: actions/setup-java@v5
        with:
          java-version: 25
          distribution: 'temurin'
          cache: 'maven'
          cache-dependency-path: portal-core/pom.xml

      - name: Build and test
        working-directory: portal-core
        run: >
          mvn clean install
          --settings ./.github/settings.xml
          --no-transfer-progress -B

      - name: Push docker image to GAR
        if: github.event_name != 'pull_request'
        uses: nais/docker-build-push@v0
        id: docker-build-push
        with:
          team: eessibasis
          image_suffix: portal-core
          docker_context: portal-core
          dockerfile: portal-core/Dockerfile
          identity_provider: ${{ secrets.NAIS_WORKLOAD_IDENTITY_PROVIDER }}
          project_id: ${{ vars.NAIS_MANAGEMENT_PROJECT_ID }}

  deploy-dev:
    name: 'Deploy to NAIS - dev-gcp'
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name != 'pull_request'
    steps:
      - uses: actions/checkout@v6
      - name: 'Calling deploy action (eessibasis namespace)'
        uses: nais/deploy/actions/deploy@v2
        env:
          CLUSTER: dev-gcp
          RESOURCE: portal-core/.nais/nais.yaml
          VAR: image=${{ needs.build.outputs.docker-image }}
          VARS: portal-core/.nais/dev.yaml
          PRINT_PAYLOAD: true
